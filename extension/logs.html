<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Логи BridgeTab</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body {
        width: auto;
        min-height: 100vh;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 28px;
      }

      pre {
        margin: 0;
        padding: 16px;
        overflow: auto;
        border: 1px solid rgba(22, 17, 13, 0.12);
        background: rgba(255, 251, 245, 0.88);
        box-shadow: 0 20px 60px rgba(54, 39, 24, 0.12);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Діагностика Bridge</p>
        <h1>Поточний знімок локального сховища</h1>
        <p class="lede">Тут показані локальні налаштування extension. Audit-логи сервера залишаються на стороні localhost bridge.</p>
      </section>
      <section class="card">
        <pre id="dump"></pre>
      </section>
    </main>
    <script type="module">
      const data = await chrome.storage.local.get(null);
      document.getElementById("dump").textContent = JSON.stringify(data, null, 2);
    </script>
  </body>
</html>
